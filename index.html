<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jaewon's 이것저것</title>
<meta name="description" content="papers, models, and rabbit holes — 읽고, 파헤치고, 남겨두는 곳.">
<meta property="og:title" content="Jaewon's 이것저것">
<meta property="og:description" content="papers, models, and rabbit holes — 읽고, 파헤치고, 남겨두는 곳.">
<meta name="theme-color" content="#f6f5f1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<style>
:root {
  --bg:#f6f5f1; --card:#ffffff; --ink:#17181c; --body:#33353c; --mut:#676b76;
  --hair:#e3e1da; --hair-dk:#cfccc2;
  --blue:#2f6bd8; --purple:#7a4fd3; --orange:#e08a1e; --pink:#d34f6e; --teal:#0f9d8c;
}
* { box-sizing:border-box; }
html { -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; scroll-behavior:smooth; }
body { margin:0; background:var(--bg); color:var(--body);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  font-size:16px; line-height:1.7; }
.serif { font-family:"Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman","Apple SD Gothic Neo",serif; }
.wrap { max-width:880px; margin:0 auto; padding:0 24px; }
a { color:var(--blue); text-decoration:none; }
a:hover { text-decoration:underline; }

/* ── top bar ─────────────────────────────────────────── */
.bar { position:sticky; top:0; z-index:50; background:rgba(246,245,241,.86);
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border-bottom:1px solid var(--hair); }
.bar-in { max-width:1080px; margin:0 auto; padding:10px 24px; display:flex; align-items:center; gap:18px; }
.bar-t { font-size:13px; font-weight:650; color:var(--ink); letter-spacing:.02em; }
.bar-t a { color:inherit; }
.bar-links { margin-left:auto; display:flex; gap:16px; font-size:13px; }

/* ── hero with flowing ink canvas ────────────────────── */
.hero-band { position:relative; overflow:hidden; background:var(--bg); }
#flow { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.hero-band::after { content:""; position:absolute; left:0; right:0; bottom:0; height:110px;
  background:linear-gradient(180deg, rgba(246,245,241,0), #f6f5f1); pointer-events:none; }
.hero-band .wrap { position:relative; }
.hero { padding:72px 0 84px; }
.hero-panel { max-width:690px;
  background:linear-gradient(180deg, rgba(255,255,255,.86), rgba(255,255,255,.55));
  border-radius:28px; padding:32px 38px 28px;
  box-shadow:0 1px 2px rgba(23,24,28,.03), 0 16px 48px rgba(23,24,28,.07),
    inset 0 0 0 1px rgba(255,255,255,.75);
  backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2); }
.pill { display:inline-flex; align-items:center; gap:8px; font-size:11px; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase; color:var(--mut);
  background:rgba(255,255,255,.85); padding:6px 14px; border-radius:999px;
  box-shadow:inset 0 0 0 1px rgba(23,24,28,.07); }
.pill .d { width:4px; height:4px; border-radius:50%; }
.pill .d0 { background:var(--blue); }
.pill .d1 { background:var(--orange); }
h1 { font-size:clamp(40px, 7.4vw, 58px); line-height:1.06; letter-spacing:-0.02em;
  color:var(--ink); margin:18px 0 10px; font-weight:650; }
h1 .hl { background:linear-gradient(180deg, transparent 64%, #f6e2b8 64%) no-repeat 0 0 / 100% 100%;
  border-radius:2px; padding:0 .04em; }
.dek { font-size:clamp(17px, 3vw, 21px); line-height:1.5; color:var(--mut); font-style:italic;
  margin:0 0 14px; max-width:640px; }
.hero-meta { font-size:13px; color:var(--mut); font-variant-numeric:tabular-nums;
  display:flex; align-items:center; gap:10px; margin:14px 0 0; }
.mini-wave { display:inline-flex; align-items:flex-end; gap:2.5px; height:14px; }
.mini-wave i { width:3px; border-radius:2px; }
.mini-wave i:nth-child(1) { height:6px;  background:var(--blue); }
.mini-wave i:nth-child(2) { height:12px; background:var(--teal); }
.mini-wave i:nth-child(3) { height:8px;  background:var(--purple); }
.mini-wave i:nth-child(4) { height:13px; background:var(--orange); }
.mini-wave i:nth-child(5) { height:5px;  background:var(--pink); }
@media (prefers-reduced-motion: no-preference) {
  .mini-wave i { animation:eq 1.5s ease-in-out infinite; transform-origin:bottom; }
  .mini-wave i:nth-child(2) { animation-delay:.12s; }
  .mini-wave i:nth-child(3) { animation-delay:.26s; }
  .mini-wave i:nth-child(4) { animation-delay:.38s; }
  .mini-wave i:nth-child(5) { animation-delay:.5s; }
}
@keyframes eq { 0%,100% { transform:scaleY(.5); } 50% { transform:scaleY(1.2); } }

/* ── controls ────────────────────────────────────────── */
main { padding-top:2px; }
.controls { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin:26px 0 8px; }
.search { flex:1 1 220px; min-width:180px; padding:9px 14px; border:1px solid var(--hair);
  border-radius:10px; background:var(--card); font:inherit; font-size:14px; color:var(--ink); }
.search::placeholder { color:#9a9da6; }
.search:focus { outline:none; border-color:var(--hair-dk); box-shadow:0 0 0 3px rgba(23,24,28,.05); }
.chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip { border:1px solid var(--hair); background:var(--card); border-radius:999px;
  padding:4px 13px; font-size:12.5px; color:var(--mut); cursor:pointer; font-family:inherit;
  transition:border-color .12s, background .12s, color .12s; }
.chip:hover { border-color:var(--hair-dk); color:var(--ink); }
.chip.on { background:var(--ink); border-color:var(--ink); color:#fff; }
.chip .n { opacity:.55; margin-left:5px; font-variant-numeric:tabular-nums; }

/* ── post list · magazine layout ─────────────────────── */
.list { padding:18px 0 8px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:680px) { .grid { grid-template-columns:1fr; } }
.card { display:flex; flex-direction:column; background:var(--card);
  border-radius:20px; overflow:hidden; color:inherit;
  box-shadow:0 1px 2px rgba(23,24,28,.03), 0 10px 30px rgba(23,24,28,.05);
  transition:transform .18s ease, box-shadow .18s ease; }
.card:hover { text-decoration:none; transform:translateY(-3px);
  box-shadow:0 2px 4px rgba(23,24,28,.04), 0 18px 44px rgba(23,24,28,.10); }
.card .art { display:block; width:100%; height:148px;
  background:var(--bg); object-fit:cover; }
.card .body { padding:17px 20px 18px; }
.card .meta { font-size:12.5px; color:var(--mut); font-variant-numeric:tabular-nums; letter-spacing:.02em; }
.card h2 { font-size:20.5px; line-height:1.32; letter-spacing:-0.01em;
  color:var(--ink); margin:7px 0 6px; font-weight:650;
  font-family:"Iowan Old Style","Palatino Linotype",Georgia,"Times New Roman","Apple SD Gothic Neo",serif; }
.card .desc { font-size:15px; line-height:1.62; color:#4a4d55; margin:0;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.card .tags { display:flex; flex-wrap:wrap; gap:5px 14px; margin-top:12px; }
.tag { font-size:12px; font-weight:650; letter-spacing:.01em; }
.tag::before { content:"#"; opacity:.5; margin-right:1px; font-weight:600; }
.t0 { color:var(--blue); }
.t1 { color:var(--purple); }
.t2 { color:var(--orange); }
.t3 { color:var(--pink); }
.t4 { color:var(--teal); }

/* newest post gets the big stage */
.card.feature { border-radius:24px; margin-bottom:18px; }
.card.feature .art { height:clamp(170px, 30vw, 264px); }
.card.feature .body { padding:22px 26px 24px; }
.card.feature h2 { font-size:clamp(23px, 4.2vw, 31px); margin:8px 0 7px; }
.card.feature .desc { -webkit-line-clamp:3; font-size:15.5px; }
.kick { display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.11em;
  text-transform:uppercase; color:var(--orange); background:#fdf3e4;
  padding:2px 10px; border-radius:999px; margin-right:8px; }

.empty { border:1.5px dashed var(--hair-dk); border-radius:14px; padding:52px 24px;
  text-align:center; color:var(--mut); font-size:15px; line-height:1.8; }
.empty code { background:var(--card); border:1px solid var(--hair); border-radius:6px;
  padding:2px 8px; font-size:13px; }

/* ── gentle motion (skipped if reduced-motion) ───────── */
@media (prefers-reduced-motion: no-preference) {
  h1 .hl { background-size:0% 100%; animation:sweep .9s cubic-bezier(.3,.6,.3,1) .4s forwards; }
  .hero-panel { animation:rise .7s cubic-bezier(.2,.7,.25,1) both; }
  .list.anim .card { animation:rise .55s cubic-bezier(.2,.7,.25,1) both;
    animation-delay:calc(var(--i, 0) * 80ms); }
}
@keyframes sweep { to { background-size:100% 100%; } }
@keyframes rise { from { opacity:0; transform:translateY(14px); } }

/* ── footer ──────────────────────────────────────────── */
footer { margin-top:64px; border-top:1px solid var(--hair); }
.foot-in { max-width:880px; margin:0 auto; padding:26px 24px 52px; display:flex;
  flex-wrap:wrap; gap:12px; justify-content:space-between; font-size:13px; color:var(--mut); }
.foot-in a { color:var(--mut); }
.foot-in a:hover { color:var(--ink); }

@media (max-width:560px) {
  .hero { padding:52px 0 64px; }
  .hero-panel { padding:22px 22px 19px; border-radius:22px; }
  .card .body { padding:15px 17px 16px; }
  .card.feature .body { padding:18px 20px 20px; }
}
</style>
</head>
<body>

<div class="bar">
  <div class="bar-in">
    <div class="bar-t"><a href="./">Jaewon's 이것저것</a></div>
    <div class="bar-links">
      <a href="https://github.com/lonj7798" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>
</div>

<div class="hero-band">
  <canvas id="flow" aria-hidden="true"></canvas>
  <div class="wrap">
    <header class="hero">
      <div class="hero-panel">
        <span class="pill"><span>reading</span><span class="d d0"></span><span>thinking</span><span class="d d1"></span><span>building</span></span>
        <h1 class="serif">Jaewon's <span class="hl">이것저것</span></h1>
        <p class="dek serif">papers, models, and rabbit holes — 읽고, 파헤치고, 남겨두는 곳.</p>
        <p class="hero-meta"><span class="mini-wave" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span><span id="heroMeta"></span></p>
      </div>
    </header>
  </div>
</div>

<main class="wrap">
  <div class="controls" id="controls" hidden>
    <input class="search" id="search" type="search" placeholder="search… ( / )" autocomplete="off">
    <div class="chips" id="chips"></div>
  </div>

  <section class="list" id="list">
    <noscript><p class="empty">이 페이지는 JavaScript로 글 목록을 그려요 — JS를 켜주세요.</p></noscript>
  </section>
</main>

<footer>
  <div class="foot-in">
    <span>© 2026 Jaewon — 이것저것</span>
    <span><a href="https://github.com/lonj7798" target="_blank" rel="noopener">GitHub</a> · <a href="#top" onclick="scrollTo({top:0,behavior:'smooth'});return false;">↑ top</a></span>
  </div>
</footer>

<script src="posts.js"></script>
<script>
(function () {
  "use strict";
  const REDUCE = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const BG = "#f6f5f1";

  /* ── shared helpers ──────────────────────────────────── */
  const esc = s => String(s ?? "").replace(/[&<>"']/g,
    c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const fmtDate = d => (d || "").replaceAll("-", ".");
  const hash32 = s => {
    let h = 2166136261;
    for (const c of s) { h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); }
    return h >>> 0;
  };
  const mulberry32 = a => () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };

  // seeded 2D Perlin noise, output ≈ [-1, 1]
  function makeNoise(seed) {
    const rand = mulberry32(seed);
    const base = Uint8Array.from({ length: 256 }, (_, i) => i);
    for (let i = 255; i > 0; i--) {
      const j = (rand() * (i + 1)) | 0;
      [base[i], base[j]] = [base[j], base[i]];
    }
    const p = new Uint8Array(512);
    for (let i = 0; i < 512; i++) p[i] = base[i & 255];
    const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
    const lerp = (a, b, t) => a + (b - a) * t;
    const grad = (h, x, y) => {
      switch (h & 7) {
        case 0: return  x + y; case 1: return -x + y;
        case 2: return  x - y; case 3: return -x - y;
        case 4: return  x;     case 5: return -x;
        case 6: return  y;     default: return -y;
      }
    };
    return (x, y) => {
      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
      x -= Math.floor(x); y -= Math.floor(y);
      const u = fade(x), v = fade(y);
      const a = p[X] + Y, b = p[X + 1] + Y;
      return lerp(
        lerp(grad(p[a], x, y),         grad(p[b], x - 1, y),     u),
        lerp(grad(p[a + 1], x, y - 1), grad(p[b + 1], x - 1, y - 1), u), v);
    };
  }

  // ink palette on paper — cool-dominant, rare warm accents
  const PAL = [
    [47, 107, 216, .32],   // blue
    [15, 157, 140, .24],   // teal
    [122, 79, 211, .18],   // purple
    [224, 138, 30, .10],   // orange
    [211, 79, 110, .07],   // pink
    [23, 24, 28,  .09],    // ink
  ];
  const pick = rand => {
    let r = rand();
    for (const [R, G, B, w] of PAL) { if ((r -= w) < 0) return [R, G, B]; }
    return PAL[0];
  };
  const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

  /* ── hero: ambient flowing ink ───────────────────────── */
  (function heroFlow() {
    const cv = document.getElementById("flow");
    if (!cv) return;
    const band = cv.parentElement;
    const ctx = cv.getContext("2d");
    const noise = makeNoise(0x9e3779b9);
    const WIND = 0.34;      // gentle left→right drift
    const SCALE = 0.0017;   // field zoom — broad, coherent currents
    let W = 0, H = 0, parts = [], raf = 0, t = 0;
    let inView = true, running = false;

    const spawn = (p = {}) => {
      p.x = Math.random() * W;
      p.y = Math.random() * H;
      p.vx = WIND; p.vy = 0;
      p.life = 500 + Math.random() * 700;
      p.w = 1.0 + Math.random() * 1.4;
      p.col = rgba(pick(Math.random), 0.30 + Math.random() * 0.26);
      return p;
    };

    function size() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      W = band.clientWidth; H = band.clientHeight;
      cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
      ctx.lineCap = "round";
      const n = Math.min(420, Math.max(100, Math.round(W * H / 2300)));
      parts = Array.from({ length: n }, () => spawn());
      if (REDUCE) drawStatic();
    }

    function step() {
      t += 0.0022;
      ctx.fillStyle = "rgba(246,245,241,0.022)";   // trails melt back into paper, slowly
      ctx.fillRect(0, 0, W, H);
      for (const p of parts) {
        const a = noise(p.x * SCALE, p.y * SCALE + t) * Math.PI * 2.1;
        p.vx += (Math.cos(a) * 1.7 + WIND - p.vx) * 0.06;   // steer softly
        p.vy += (Math.sin(a) * 1.7 - p.vy) * 0.06;
        const nx = p.x + p.vx, ny = p.y + p.vy;
        ctx.strokeStyle = p.col; ctx.lineWidth = p.w;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(nx, ny); ctx.stroke();
        p.x = nx; p.y = ny;
        if (--p.life < 0 || p.x < -12 || p.x > W + 12 || p.y < -12 || p.y > H + 12) spawn(p);
      }
    }

    // reduced-motion: one elegant still frame instead of animation
    function drawStatic() {
      const rand = mulberry32(20260707);
      ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 110; i++) {
        let x = rand() * W, y = rand() * H;
        ctx.strokeStyle = rgba(pick(rand), 0.30 + rand() * 0.2);
        ctx.lineWidth = 0.8 + rand() * 1.2;
        ctx.beginPath(); ctx.moveTo(x, y);
        for (let k = 0; k < 90; k++) {
          const a = noise(x * SCALE, y * SCALE) * Math.PI * 2.1;
          x += Math.cos(a) * 2.6 + WIND * 2;
          y += Math.sin(a) * 2.6;
          ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    function loop() { step(); raf = requestAnimationFrame(loop); }
    function play() {
      if (running || REDUCE || document.hidden || !inView) return;
      running = true; raf = requestAnimationFrame(loop);
    }
    function stop() { running = false; cancelAnimationFrame(raf); }

    size();
    let rt = 0;
    addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(size, 120); });
    new IntersectionObserver(es => {
      inView = es[0].isIntersecting;
      inView ? play() : stop();
    }).observe(band);
    document.addEventListener("visibilitychange", () => document.hidden ? stop() : play());
    play();
  })();

  /* ── generative cover art per post ───────────────────── */
  function sizeArt(cv) {
    const dpr = Math.min(devicePixelRatio || 1, 2);
    const w = cv._w = cv.clientWidth || 320;
    const h = cv._h = cv.clientHeight || 148;
    cv.width = Math.round(w * dpr);
    cv.height = Math.round(h * dpr);
    cv.getContext("2d").setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // per-post generative cover — a MOTIF (structure) + palette, both seeded by slug.
  // posts.js can pin the motif via "art": "wave" | "ridge" | "cells" | "ribbon";
  // unset posts draw from the family by hash, so no two neighbors need to match.
  const MOTIFS = ["wave", "ridge", "cells", "ribbon", "synapse"];
  const mixc = (a, b, u, al) =>
    `rgba(${(a[0] + (b[0] - a[0]) * u) | 0},${(a[1] + (b[1] - a[1]) * u) | 0},${(a[2] + (b[2] - a[2]) * u) | 0},${al})`;

  function drawArt(cv, t) {
    const ctx = cv.getContext("2d");
    if (!cv._art) {
      const seed = (+cv.dataset.seed || 1) >>> 0;
      cv._noise = makeNoise(seed);
      const rand = mulberry32(seed ^ 0xabcdef);
      const i1 = (rand() * PAL.length) | 0;
      const i2 = (i1 + 1 + ((rand() * (PAL.length - 1)) | 0)) % PAL.length;
      cv._art = {
        motif: MOTIFS.includes(cv.dataset.art) ? cv.dataset.art : MOTIFS[seed % MOTIFS.length],
        o1: rand() * 20, o2: rand() * 20,     // noise phases: envelope / detail
        sp: 0.85 + rand() * 0.5,              // per-post frequency character
        c1: PAL[i1], c2: PAL[i2],             // gradient endpoints
        seed,                                 // for motifs that need their own RNG stream
      };
    }
    ctx.fillStyle = BG; ctx.fillRect(0, 0, cv._w, cv._h);
    ART[cv._art.motif](ctx, cv, t);
  }

  const ART = {
    // synapse — a knowledge constellation: one query fans out through the graph
    // and reconverges on an answer (the retrieval journey, drawn as ink)
    synapse(ctx, cv, t) {
      const w = cv._w, h = cv._h, noise = cv._noise, a = cv._art;
      const rand = mulberry32((a.seed >>> 0) ^ 0x51A95E);
      const mx = w * 0.055, my = h * 0.16;
      const N = Math.max(15, Math.round(w / 33));
      // knowledge nodes — organic scatter, nudged off a loose grid so no two collide
      const nodes = [];
      for (let i = 0; i < N; i++) {
        const gx = (i + 0.5) / N;
        nodes.push({
          x: mx + (w - 2 * mx) * (gx + (rand() - 0.5) * 0.55 / N * 4),
          y: my + (h - 2 * my) * rand(),
          r: 1 + rand() * 1.6, ph: rand() * 20,
        });
      }
      nodes.sort((p, q) => p.x - q.x);
      // edges — each node reaches to its 2 nearest rightward neighbors (a DAG flowing east)
      const edges = [];
      for (let i = 0; i < N; i++) {
        const cand = [];
        for (let j = i + 1; j < N; j++) {
          const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
          cand.push([dx * dx + dy * dy * 1.7, j]);
        }
        cand.sort((p, q) => p[0] - q[0]);
        nodes[i].out = cand.slice(0, 2).map(c => c[1]);
        for (const j of nodes[i].out) edges.push([i, j]);
      }
      const bend = (p, q, k) =>          // gentle noise-bowed control point
        [(p.x + q.x) / 2 + noise(p.x * 0.01, k) * h * 0.10,
         (p.y + q.y) / 2 + noise(q.x * 0.01, k + 7) * h * 0.14];
      // substrate: every association, barely-there ink
      ctx.lineWidth = 1;
      for (const [i, j] of edges) {
        const p = nodes[i], q = nodes[j], c = bend(p, q, a.o2);
        ctx.strokeStyle = "rgba(23,24,28,.065)";
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.quadraticCurveTo(c[0], c[1], q.x, q.y); ctx.stroke();
      }
      // three retrieval paths from the same query node — fan out, often reconverge
      const paths = [];
      for (let k = 0; k < 3; k++) {
        let i = 0; const path = [0];
        while (nodes[i].out.length) {
          i = nodes[i].out[nodes[i].out.length > 1 && rand() < 0.45 ? 1 : 0];
          path.push(i);
        }
        paths.push(path);
      }
      const drift = t * 0.05;
      paths.forEach((path, k) => {
        ctx.lineWidth = Math.max(1.3, h * 0.010); ctx.lineCap = "round";
        for (let s2 = 0; s2 < path.length - 1; s2++) {
          const p = nodes[path[s2]], q = nodes[path[s2 + 1]], c = bend(p, q, a.o2);
          ctx.strokeStyle = mixc(a.c1, a.c2, (p.x + q.x) / 2 / w, 0.34 + k * 0.05);
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.quadraticCurveTo(c[0], c[1], q.x, q.y); ctx.stroke();
        }
        // one slow pulse per path (complete artwork at t=0: pulses rest mid-path)
        const u = (0.22 + k * 0.27 + drift) % 1;
        const s3 = Math.min(path.length - 2, (u * (path.length - 1)) | 0);
        const f = u * (path.length - 1) - s3;
        const p = nodes[path[s3]], q = nodes[path[s3 + 1]], c = bend(p, q, a.o2);
        const px = (1 - f) * (1 - f) * p.x + 2 * (1 - f) * f * c[0] + f * f * q.x;
        const py = (1 - f) * (1 - f) * p.y + 2 * (1 - f) * f * c[1] + f * f * q.y;
        ctx.fillStyle = mixc(a.c1, a.c2, px / w, 0.9);
        ctx.beginPath(); ctx.arc(px, py, Math.max(2, h * 0.016), 0, 7); ctx.fill();
      });
      // nodes on top: on-path nodes filled with gradient ink, the rest quiet hollow dots
      const onPath = new Set(paths.flat());
      nodes.forEach((p, i) => {
        const breathe = 1 + 0.10 * noise(p.ph, t * 0.25);
        const r = (p.r + (onPath.has(i) ? 1.1 : 0)) * Math.max(1, h / 190) * breathe;
        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 7);
        if (onPath.has(i)) { ctx.fillStyle = mixc(a.c1, a.c2, p.x / w, 0.85); ctx.fill(); }
        else { ctx.fillStyle = "rgba(23,24,28,.30)"; ctx.fill(); }
      });
      // the query (west) and the answer (east): ringed, like pins on a map
      const ring = (p, cc) => { ctx.strokeStyle = cc; ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(4.5, h * 0.036), 0, 7); ctx.stroke(); };
      ring(nodes[0], mixc(a.c1, a.c2, 0, 0.9));
      ring(nodes[paths[0][paths[0].length - 1]], mixc(a.c1, a.c2, 1, 0.9));
    },

    // soundwave — amplitude bars around a centerline (the original)
    wave(ctx, cv, t) {
      const w = cv._w, h = cv._h, noise = cv._noise, a = cv._art;
      const mid = h / 2, maxA = h * 0.40;
      const bw = Math.max(2.2, h * 0.022);
      const pitch = bw * 2.15;
      const drift = t * 46;                   // waveform crawls on hover
      ctx.strokeStyle = "rgba(23,24,28,.07)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(6, mid); ctx.lineTo(w - 6, mid); ctx.stroke();
      ctx.lineCap = "round"; ctx.lineWidth = bw;
      for (let x = bw * 1.5; x <= w - bw * 1.5; x += pitch) {
        const env = Math.abs(noise((x + drift) * 0.0055 * a.sp, a.o1));
        const det = Math.abs(noise((x + drift) * 0.030 * a.sp, a.o2 + t * 0.7));
        const amp = Math.max(maxA * (0.18 + 0.82 * env) * (0.30 + 0.70 * det), h * 0.016);
        ctx.strokeStyle = mixc(a.c1, a.c2, x / w, 0.82);
        ctx.beginPath(); ctx.moveTo(x, mid - amp); ctx.lineTo(x, mid + amp); ctx.stroke();
      }
    },

    // ridgeline — quiet stacked profiles, drawn back to front (occluding fills)
    ridge(ctx, cv, t) {
      const w = cv._w, h = cv._h, noise = cv._noise, a = cv._art;
      const rows = Math.max(4, Math.round(h / 42));
      const top = h * 0.32, gap = (h * 0.58) / (rows - 1), amp = gap * 2.2;
      const drift = t * 30;
      for (let r = 0; r < rows; r++) {
        const y0 = top + r * gap, u = rows > 1 ? r / (rows - 1) : 0;
        ctx.beginPath();
        for (let x = -4; x <= w + 4; x += 3) {
          const n = Math.abs(noise((x + drift) * 0.006 * a.sp, a.o1 + r * 2.7));
          const d = Math.abs(noise((x + drift) * 0.020 * a.sp, a.o2 + r * 1.3 + t * 0.5));
          ctx.lineTo(x, y0 - amp * n * (0.55 + 0.45 * d));
        }
        ctx.lineTo(w + 4, h + 8); ctx.lineTo(-4, h + 8); ctx.closePath();
        ctx.fillStyle = BG; ctx.fill();
        ctx.strokeStyle = mixc(a.c1, a.c2, u, 0.78 - u * 0.30);
        ctx.lineWidth = 1.8; ctx.stroke();
      }
    },

    // cells — a breathing grid of rounded blocks (memory pages)
    cells(ctx, cv, t) {
      const w = cv._w, h = cv._h, noise = cv._noise, a = cv._art;
      const s = Math.max(10, h / 6.4), g = Math.max(3, s * 0.26);
      const cols = Math.ceil(w / (s + g)), rows = Math.ceil(h / (s + g));
      const ox = (w - cols * (s + g) + g) / 2, oy = (h - rows * (s + g) + g) / 2;
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
        const v = Math.abs(noise(c * 0.55 + a.o1 + t * 0.35, r * 0.7 + a.o2));
        ctx.fillStyle = mixc(a.c1, a.c2, cols > 1 ? c / (cols - 1) : 0, 0.08 + 0.74 * v);
        ctx.beginPath();
        const x = ox + c * (s + g), y = oy + r * (s + g), rd = s * 0.22;
        ctx.roundRect ? ctx.roundRect(x, y, s, s, rd) : ctx.rect(x, y, s, s);
        ctx.fill();
      }
    },

    // ribbon — one flowing ink band, echoing the hero currents
    ribbon(ctx, cv, t) {
      const w = cv._w, h = cv._h, noise = cv._noise, a = cv._art;
      const mid = h / 2, drift = t * 40;
      const edge = (x, o) => noise((x + drift) * 0.0045 * a.sp, o) * h * 0.26;
      const grd = ctx.createLinearGradient(0, 0, w, 0);
      grd.addColorStop(0, mixc(a.c1, a.c2, 0, 0.30));
      grd.addColorStop(1, mixc(a.c1, a.c2, 1, 0.30));
      ctx.beginPath();
      for (let x = -4; x <= w + 4; x += 3) ctx.lineTo(x, mid + edge(x, a.o1) - h * 0.10);
      for (let x = w + 4; x >= -4; x -= 3) ctx.lineTo(x, mid + edge(x, a.o2) + h * 0.10);
      ctx.closePath(); ctx.fillStyle = grd; ctx.fill();
      for (let k = 0; k < 3; k++) {
        ctx.beginPath();
        for (let x = -4; x <= w + 4; x += 3)
          ctx.lineTo(x, mid + edge(x, a.o1 + k * 1.7) * (0.55 + k * 0.18));
        ctx.strokeStyle = mixc(a.c1, a.c2, k / 2, 0.50 - k * 0.12);
        ctx.lineWidth = 1.4; ctx.stroke();
      }
    },
  };

  function initArts(root) {
    root.querySelectorAll("canvas.art").forEach(cv => {
      sizeArt(cv);
      drawArt(cv, cv._t = 0);
      if (REDUCE) return;
      const card = cv.closest(".card");
      let raf = 0;
      card.addEventListener("pointerenter", () => {
        cancelAnimationFrame(raf);
        const tick = () => { cv._t += 0.016; drawArt(cv, cv._t); raf = requestAnimationFrame(tick); };
        raf = requestAnimationFrame(tick);
      });
      card.addEventListener("pointerleave", () => cancelAnimationFrame(raf));
    });
  }

  let artRt = 0;
  addEventListener("resize", () => {
    clearTimeout(artRt);
    artRt = setTimeout(() => {
      document.querySelectorAll("canvas.art").forEach(cv => { sizeArt(cv); drawArt(cv, cv._t || 0); });
    }, 150);
  });

  /* ── post list ───────────────────────────────────────── */
  (function postList() {
    const posts = (window.POSTS || []).slice().sort((a, b) =>
      (b.date || "").localeCompare(a.date || "") || (a.title || "").localeCompare(b.title || ""));

    const $list = document.getElementById("list");
    const $chips = document.getElementById("chips");
    const $search = document.getElementById("search");
    const $meta = document.getElementById("heroMeta");
    const $controls = document.getElementById("controls");

    let activeTag = null, query = "", firstRender = true;

    const tagClass = t => {
      let h = 0;
      for (const c of t) h = (h * 31 + c.charCodeAt(0)) >>> 0;
      return "t" + (h % 5);
    };

    if (posts.length) {
      $meta.textContent = `${posts.length} post${posts.length > 1 ? "s" : ""} · last updated ${fmtDate(posts[0].date)}`;
      $controls.hidden = posts.length < 2 && !posts.some(p => (p.tags || []).length);
    } else {
      $meta.textContent = "0 posts — coming soon";
    }

    const counts = new Map();
    posts.forEach(p => (p.tags || []).forEach(t => counts.set(t, (counts.get(t) || 0) + 1)));
    const chipEls = [];
    const mkChip = (label, tag, n) => {
      const b = document.createElement("button");
      b.className = "chip";
      b.innerHTML = `${esc(label)}<span class="n">${n}</span>`;
      b.dataset.tag = tag ?? "";
      b.onclick = () => { activeTag = (activeTag === tag) ? null : tag; sync(); };
      chipEls.push(b);
      $chips.appendChild(b);
    };
    if (counts.size) {
      mkChip("전체", null, posts.length);
      [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .forEach(([t, n]) => mkChip(t, t, n));
    }

    const matches = p => {
      if (activeTag && !(p.tags || []).includes(activeTag)) return false;
      if (!query) return true;
      return `${p.title} ${p.description || ""} ${(p.tags || []).join(" ")}`
        .toLowerCase().includes(query);
    };

    function render() {
      if (!posts.length) {
        $list.innerHTML = `<div class="empty">아직 아무것도 없어요.<br>
          <code>./new-post.sh &lt;html&gt;</code> 로 첫 글을 올려보세요 ✏️</div>`;
        return;
      }
      const shown = posts.filter(matches);
      if (!shown.length) {
        $list.innerHTML = `<div class="empty">검색 결과가 없어요 — try another word.</div>`;
        return;
      }
      $list.classList.toggle("anim", firstRender);
      const artOf = p => p.cover
        ? `<img class="art" src="${esc(p.cover)}" alt="" loading="lazy">`
        : `<canvas class="art" data-seed="${hash32(p.slug)}"${p.art ? ` data-art="${esc(p.art)}"` : ""} aria-hidden="true"></canvas>`;
      const cardOf = (p, i, cls, kick) => `
        <a class="card${cls ? " " + cls : ""}" href="posts/${encodeURIComponent(p.slug)}/" style="--i:${i}">
          ${artOf(p)}
          <div class="body">
            <div class="meta">${kick ? `<span class="kick">latest</span>` : ""}${fmtDate(p.date)}${p.lang ? ` &nbsp;·&nbsp; ${esc(p.lang)}` : ""}</div>
            <h2>${esc(p.title)}</h2>
            ${p.description ? `<p class="desc">${esc(p.description)}</p>` : ""}
            ${(p.tags || []).length ? `<div class="tags">${p.tags.map(t =>
              `<span class="tag ${tagClass(t)}">${esc(t)}</span>`).join("")}</div>` : ""}
          </div>
        </a>`;
      const [first, ...rest] = shown;
      $list.innerHTML =
        cardOf(first, 0, "feature", first === posts[0]) +
        (rest.length ? `<div class="grid">${rest.map((p, i) => cardOf(p, i + 1, "", false)).join("")}</div>` : "");
      initArts($list);
      firstRender = false;
    }

    function sync() {
      chipEls.forEach(b => b.classList.toggle("on",
        (b.dataset.tag || null) === activeTag || (!activeTag && b.dataset.tag === "")));
      render();
    }

    $search.addEventListener("input", () => { query = $search.value.trim().toLowerCase(); render(); });
    document.addEventListener("keydown", e => {
      if (e.key === "/" && document.activeElement !== $search) { e.preventDefault(); $search.focus(); }
      if (e.key === "Escape" && document.activeElement === $search) {
        $search.value = ""; query = ""; render(); $search.blur();
      }
    });

    sync();
  })();
})();
</script>
</body>
</html>
